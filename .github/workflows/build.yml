name: Build

on:
  push:
    # tags:
    #   - "v*"

jobs:
  binaries:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: tungsten
            name: tungsten-linux-gnu

          # - os: windows-latest
          #   target: x86_64-pc-windows-msvc
          #   bin: tungsten.exe
          #   name: tungsten-windows-msvc.exe

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux cross toolchains
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libfontconfig1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxrandr-dev \
            libxi-dev \
            libxcursor-dev

      - uses: Swatinem/rust-cache@v2

      - name: Check
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo check --workspace --all-targets

      - name: Build
        run: cargo build --workspace --release --target ${{ matrix.target }}

      - name: Stage
        shell: bash
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} dist/${{ matrix.name }}

      - name: Upload
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}

